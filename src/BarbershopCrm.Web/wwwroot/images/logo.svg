<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Левое кольцо ножниц -->
  <circle cx="12" cy="10" r="4.5" fill="none" stroke="#B89968" stroke-width="2"/>
  <circle cx="12" cy="10" r="2.5" fill="none" stroke="#B89968" stroke-width="1.2"/>
  
  <!-- Правое кольцо ножниц -->
  <circle cx="28" cy="10" r="4.5" fill="none" stroke="#B89968" stroke-width="2"/>
  <circle cx="28" cy="10" r="2.5" fill="none" stroke="#B89968" stroke-width="1.2"/>
  
  <!-- Левое лезвие -->
  <path d="M 12 14 L 20 20 L 18 32 Q 17.5 34 16 34 Q 15 34 15 32.5 L 17 21 Z" 
        fill="#332C24" stroke="#B89968" stroke-width="1.8" stroke-linejoin="round"/>
  
  <!-- Правое лезвие -->
  <path d="M 28 14 L 20 20 L 22 32 Q 22.5 34 24 34 Q 25 34 25 32.5 L 23 21 Z" 
        fill="#332C24" stroke="#B89968" stroke-width="1.8" stroke-linejoin="round"/>
  
  <!-- Блики на лезвиях -->
  <line x1="17.5" y1="22" x2="16.5" y2="30" stroke="#E8E0D2" stroke-width="0.8" stroke-linecap="round" opacity="0.6"/>
  <line x1="22.5" y1="22" x2="23.5" y2="30" stroke="#E8E0D2" stroke-width="0.8" stroke-linecap="round" opacity="0.6"/>
  
  <!-- Винт (точка соединения) -->
  <circle cx="20" cy="20" r="2" fill="#B89968"/>
  <circle cx="20" cy="20" r="1" fill="#332C24"/>
  <circle cx="20" cy="20" r="0.3" fill="#B89968"/>
</svg>
